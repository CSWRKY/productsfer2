<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de Productos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Lista de precios</p>
          <h1>Buscador de productos</h1>
        </div>
        <div class="summary" aria-live="polite">
          <strong id="totalProducts">0</strong>
          <span>productos cargados</span>
        </div>
      </header>

      <section class="search-panel" aria-label="Busqueda de productos">
        <label class="search-box" for="searchInput">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="Buscar por palabra clave, producto o codigo"
          />
        </label>

        <div class="controls">
          <label class="toggle">
            <input id="hideZeroPrice" type="checkbox" checked />
            <span>Solo con precio</span>
          </label>
          <label class="toggle">
            <input id="hideNoStock" type="checkbox" />
            <span>Solo con existencia</span>
          </label>
          <button id="clearSearch" class="ghost-button" type="button">Limpiar</button>
        </div>
      </section>

      <section class="results-head" aria-live="polite">
        <div>
          <strong id="resultCount">0 resultados</strong>
          <span id="queryHint">Escribe para filtrar la lista.</span>
        </div>
      </section>

      <section class="table-wrap" aria-label="Resultados">
        <table>
          <thead>
            <tr>
              <th scope="col">Codigo</th>
              <th scope="col">Producto</th>
              <th scope="col">Medida</th>
              <th scope="col">Existencia</th>
              <th scope="col">Precio</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" hidden>
          <strong>Sin resultados</strong>
          <span>Prueba con menos palabras o revisa el codigo.</span>
        </div>
      </section>
    </main>

    <script src="productos.js"></script>
    <script src="app.js"></script>
  </body>
</html>
